name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - frontend/**
  workflow_dispatch:

# contents:read is the global default. pages:write and id-token:write are
# scoped to the deploy job only via job-level permissions below.
permissions:
  contents: read

# Allow only one Pages deployment at a time; never cancel an in-progress
# deploy (let it finish so the site isn't left in a broken state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: npm ci

      - name: Build minified assets
        run: npm run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: frontend/docs

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # Elevated permissions scoped to this job only.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
